name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  VERSION: v1.0.0

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Scaleway Registry
        run: echo "${{ secrets.SCW_SECRET_KEY }}" | docker login rg.fr-par.scw.cloud -u nologin --password-stdin

      - name: Build Docker image
        run: docker build -t rg.fr-par.scw.cloud/namespace-bateau/lukas:${{ env.VERSION }} .

      - name: Push Docker image
        run: docker push rg.fr-par.scw.cloud/namespace-bateau/lukas:${{ env.VERSION }}
