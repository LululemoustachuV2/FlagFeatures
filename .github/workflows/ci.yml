name: CI

on:
  push:
    branches: ["**"]
  pull_request:


jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Scaleway Registry
        run: echo "${{ secrets.SCW_SECRET_KEY }}" | docker login rg.fr-par.scw.cloud -u nologin --password-stdin

      - name: Build Docker image
        run: docker build -t rg.fr-par.scw.cloud/namespace-bateau/lukas:${{ github.sha }} .

      - name: Push Docker image
        run: docker push rg.fr-par.scw.cloud/namespace-bateau/lukas:${{ github.sha }}

      - name: Install Scaleway CLI
        run: curl -s https://raw.githubusercontent.com/scaleway/scaleway-cli/master/scripts/get.sh | sh && sudo mv /usr/local/bin/scw /usr/local/bin/scw || true

      - name: Configure Scaleway CLI
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_ORGANIZATION_ID }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_DEFAULT_REGION: fr-par
          SCW_DEFAULT_ZONE: fr-par-1
        run: |
          scw init \
            access-key=$SCW_ACCESS_KEY \
            secret-key=$SCW_SECRET_KEY \
            organization-id=$SCW_DEFAULT_ORGANIZATION_ID \
            project-id=$SCW_DEFAULT_PROJECT_ID \
            region=$SCW_DEFAULT_REGION \
            zone=$SCW_DEFAULT_ZONE \
            send-telemetry=false \
            install-autocomplete=false \
            with-ssh-key=false

      - name: Update Scaleway Container image
        run: scw container container update ${{ secrets.SCW_CONTAINER_ID }} image=rg.fr-par.scw.cloud/namespace-bateau/lukas:${{ github.sha }}

      - name: Trigger Scaleway Container redeploy
        run: scw container container redeploy ${{ secrets.SCW_CONTAINER_ID }}
